<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva Tu Cita - Barbería</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: white; 
            font-family: sans-serif; 
            display: flex !important;
            justify-content: center !important; 
            align-items: center !important; 
            min-height: 100vh !important;
            margin: 0 !important;
        }

        .contenedor { 
            background-color: #262626; 
            padding: 60px 30px !important; 
            border-radius: 25px; 
            width: 96% !important; 
            max-width: 500px; 
            border: 3px solid #f1c40f; 
            box-shadow: 0px 15px 50px rgba(0,0,0,0.9);
            box-sizing: border-box !important;
        }

        h2 { text-align: center; color: #f1c40f; font-size: 2rem !important; margin-bottom: 30px; text-transform: uppercase; }
        label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 1.1rem; }
        
        input, select { 
            width: 100%; 
            height: 60px !important;
            padding: 15px !important; 
            margin-bottom: 25px; 
            border-radius: 10px; 
            border: 1px solid #444; 
            background: #1e1e1e;
            color: white;
            font-size: 1.2rem !important;
        }

        .custom-dropdown { position: relative; width: 100%; margin-bottom: 25px; }
        .dropdown-header { 
            background: #1a1a1a; color: white; border: 1px solid #d4af37; 
            padding: 15px; border-radius: 10px; display: flex; 
            justify-content: space-between; align-items: center; cursor: pointer; 
        }
        .dropdown-list { 
            position: absolute; top: 105%; left: 0; width: 100%; 
            background: #222; border: 1px solid #d4af37; border-radius: 10px; 
            display: none; z-index: 1000; 
        }
        .dropdown-item { padding: 15px; display: flex; justify-content: space-between; cursor: pointer; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .custom-dropdown.open .dropdown-list { display: block; }

        .calendario-container { background: #1a1a1a; border-left: 4px solid #d4af37; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .grid-horas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        
        .btn-hora { 
            background-color: #000000; color: #d4af37; border: 1px solid #d4af37; 
            padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-hora.seleccionada { background-color: #d4af37 !important; color: #000 !important; transform: scale(1.1); }
        .btn-hora:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-confirmar { 
            width: 100%; background-color: #d4af37; color: black; padding: 20px; 
            font-weight: bold; font-size: 1.3rem; border-radius: 12px; border: none; cursor: pointer; 
        }
        .btn-cancelar { 
            width: 100%; max-width: 350px; height: 50px; background-color: #333; 
            color: #777; border: 1px solid #444; border-radius: 5px; font-weight: bold; cursor: not-allowed; 
        }
        .btn-cancelar.activo { background-color: #d32f2f !important; color: white !important; cursor: pointer; }

        @media (max-width: 600px) {
            .contenedor { width: 92% !important; padding: 40px 20px !important; }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h2 id="titulo-saludo">RESERVA TU CITA 💈</h2>

    <div id="seccion-datos">
        <label>Nombre Completo</label>
        <input type="text" id="nombre-cliente" placeholder="Ej: Juan Pérez">
        <label>Correo Electrónico</label>
        <input type="email" id="email-cliente" placeholder="tu@correo.com">
    </div> 

    <label>Selecciona tu Servicio ✂️</label>
    <div class="custom-dropdown" id="custom-dropdown">
        <div class="dropdown-header" id="dropdown-header">
            <span>Seleccione un servicio...</span>
            <span class="arrow">▼</span>
        </div>
        <div class="dropdown-list" id="dropdown-list"></div>
    </div>
    <input type="hidden" id="servicio-elegido" value="">

    <div class="calendario-container">
        <label>Elige el día</label>
        <input type="date" id="fecha-reserva" class="input-fecha-pro">
        <div id="contenedor-horas-cliente" class="grid-horas"></div>
    </div>

    <input type="hidden" id="hora-selecc-input">

    <button type="button" class="btn-confirmar" onclick="enviarReserva()">CONFIRMAR CITA</button>
    
    <div style="width: 100%; display: flex; justify-content: center; margin-top: 15px;">
        <button type="button" id="btnCancelar" class="btn-cancelar" disabled onclick="cancelarCita()">CANCELAR CITA</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    
    const firebaseConfig = {
        apiKey: "AIzaSyCMQoOf2gnIgLOWAhQXuWl0TYPwtzXk1j8", 
        authDomain: "brothersbarber-dc120.firebaseapp.com",
        projectId: "brothersbarber-dc120",
        storageBucket: "brothersbarber-dc120.appspot.com",
        messagingSenderId: "999313470063",
        appId: "1:999313470063:web:98f3050477b86dda3cd39a"
    };

    const urlCerebro = "https://script.google.com/macros/s/AKfycbwI_-YsVrjumQ1o6gi_x-jcv43kBFSISYY1jyvt8uoTfw85rnp8pQ5O2D4MafvtvTiR/exec";

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("barberos").orderBy("nombre", "asc").onSnapshot((snapshot) => {
    const selectBarbero = document.getElementById("barbero"); // Asegúrate que tu <select> tenga id="barbero"
    
    // Dejamos la opción inicial
    selectBarbero.innerHTML = '<option value="" disabled selected>Selecciona tu barbero</option>';

    snapshot.forEach((doc) => {
        const barbero = doc.data();
        const option = document.createElement("option");
        option.value = barbero.nombre; // Lo que se guarda en la cita
        option.textContent = barbero.nombre; // Lo que ve el cliente
        selectBarbero.appendChild(option);
    });
});
    window.onload = function() {
        const n = localStorage.getItem('nombreBarberia');
        const e = localStorage.getItem('emailBarberia');
        if (n) {
            document.getElementById('nombre-cliente').value = n;
            document.getElementById('titulo-saludo').innerText = `¡Hola ${n.split(' ')[0]}! 💈`;
        }
        if (e) document.getElementById('email-cliente').value = e;
        if (n && e) document.getElementById('seccion-datos').style.display = "none";
        
        verificarCitaExistente();
        cargarServiciosFirebase();
    };

    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('fecha-reserva').setAttribute('min', hoy);

   
    function cargarServiciosFirebase() {
        const dropdownList = document.getElementById("dropdown-list");
        db.collection("servicios").onSnapshot((snapshot) => {
            dropdownList.innerHTML = "";
            snapshot.forEach((doc) => {
                const s = doc.data();
                const item = document.createElement("div");
                item.className = "dropdown-item";
                item.innerHTML = `<span>${s.nombre} (${s.tiempo} min)</span><span style="color:#d4af37">$${s.precio}</span>`;
                item.onclick = () => {
                    document.getElementById("dropdown-header").querySelector("span").innerText = `${s.nombre} (${s.tiempo} min)`;
                    document.getElementById("servicio-elegido").value = s.nombre;
                    document.getElementById("custom-dropdown").classList.remove("open");
                };
                dropdownList.appendChild(item);
            });
        });
    }

    document.getElementById("dropdown-header").onclick = () => {
        document.getElementById("custom-dropdown").classList.toggle("open");
    };

    async function cargarHorasDisponibles() {
        const fecha = document.getElementById('fecha-reserva').value;
        if (!fecha) return;

        const contenedor = document.getElementById('contenedor-horas-cliente');
        contenedor.innerHTML = "Cargando...";

        try {
            const response = await fetch(`${urlCerebro}?fecha=${fecha}`);
            const data = await response.json();
            
            const ocupadas = data.ocupadas || [];
            const habilitadas = JSON.parse(data.config.horasHabilitadas || "[]");
            const diasLaborales = JSON.parse(data.config.diasLaborales || "[]");

            const fechaObj = new Date(fecha.replace(/-/g, '/'));
            const diaNombre = new Intl.DateTimeFormat('es-ES', { weekday: 'long' }).format(fechaObj).toLowerCase();

            if (!diasLaborales.includes(diaNombre)) {
                contenedor.innerHTML = `<p style="color:#ff4d4d; grid-column: 1/4;">No laboral (${diaNombre})</p>`;
                return;
            }

            contenedor.innerHTML = "";
            habilitadas.forEach(hora => {
                const estaOcupada = ocupadas.includes(hora);
                const btn = document.createElement('button');
                btn.className = estaOcupada ? "btn-hora ocupada" : "btn-hora disponible";
                btn.innerText = estaOcupada ? hora + " ✖" : hora;
                btn.disabled = estaOcupada;

                if (!estaOcupada) {
                    btn.onclick = () => {
                        document.querySelectorAll('.btn-hora').forEach(b => b.classList.remove('seleccionada'));
                        btn.classList.add('seleccionada');
                        document.getElementById('hora-selecc-input').value = hora;
                    };
                }
                contenedor.appendChild(btn);
            });
        } catch (error) {
            contenedor.innerHTML = "Error al cargar.";
        }
    }

    document.getElementById('fecha-reserva').addEventListener('change', cargarHorasDisponibles);

    async function enviarReserva() {
        const nombre = document.getElementById('nombre-cliente').value;
        const email = document.getElementById('email-cliente').value;
        const fecha = document.getElementById('fecha-reserva').value;
        const hora = document.getElementById('hora-selecc-input').value;
        const servicio = document.getElementById('servicio-elegido').value;

        if (!nombre || !fecha || !hora || !servicio) {
            alert("⚠️ Por favor completa todos los campos.");
            return;
        }

        try {
            
            await db.collection("reservas").add({
                nombre, email, fecha, hora, servicio,
                barbero: "Jeison",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            fetch(urlCerebro + "?action=add", {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ nombre, email, fecha, hora, servicio })
            });

            localStorage.setItem('nombreBarberia', nombre);
            localStorage.setItem('emailBarberia', email);
            localStorage.setItem('ultimaCita_Detalle', JSON.stringify({ nombre, fecha, hora }));

            alert("🚀 ¡CITA CONFIRMADA! Te llegará un correo.");
            window.location.reload();

        } catch (error) {
            alert("Error: " + error.message);
        }
    }

    async function cancelarCita() {
        const cita = JSON.parse(localStorage.getItem('ultimaCita_Detalle'));
        if (!cita) return;

        if (confirm(`¿Cancelar cita del ${cita.fecha} a las ${cita.hora}?`)) {
            const btnCan = document.getElementById('btnCancelar');
            btnCan.innerText = "CANCELANDO...";
            btnCan.disabled = true;

            try {
                await fetch(urlCerebro + "?action=delete", {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(cita)
                });
                alert("❌ Cita cancelada.");
                localStorage.removeItem('ultimaCita_Detalle');
                window.location.reload();
            } catch (e) {
                alert("Error al cancelar.");
                btnCan.disabled = false;
            }
        }
    }

    function verificarCitaExistente() {
        const cita = localStorage.getItem('ultimaCita_Detalle');
        if (cita) {
            const btnCan = document.getElementById('btnCancelar');
            btnCan.disabled = false;
            btnCan.classList.add('activo');
        }
    }
</script>
</body>
</html>
